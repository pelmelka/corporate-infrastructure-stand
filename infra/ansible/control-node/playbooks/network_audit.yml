---
- name: Prepare local network audit directories
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Define stable network audit context
      ansible.builtin.set_fact:
        network_audit_base_dir: "{{ playbook_dir }}/../docs/network-audit"
        network_audit_timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"

    - name: Store network audit context
      ansible.builtin.add_host:
        name: network_audit_context
        audit_base_dir: "{{ network_audit_base_dir }}"
        audit_timestamp: "{{ network_audit_timestamp }}"

    - name: Ensure network audit base directory exists
      ansible.builtin.file:
        path: "{{ network_audit_base_dir }}"
        state: directory
        mode: "0755"

    - name: Reset latest network audit directory
      ansible.builtin.file:
        path: "{{ network_audit_base_dir }}/latest"
        state: absent

    - name: Create latest network audit directory
      ansible.builtin.file:
        path: "{{ network_audit_base_dir }}/latest"
        state: directory
        mode: "0755"

    - name: Create timestamped network audit directory
      ansible.builtin.file:
        path: "{{ network_audit_base_dir }}/{{ network_audit_timestamp }}"
        state: directory
        mode: "0755"


- name: Collect per-node network and firewall audit
  hosts: control:managed
  gather_facts: false
  become: true

  vars_prompt:
    - name: ansible_become_password
      prompt: "BECOME password"
      private: true

  vars:
    network_audit_base_dir: "{{ hostvars['network_audit_context']['audit_base_dir'] }}"
    network_audit_timestamp: "{{ hostvars['network_audit_context']['audit_timestamp'] }}"
    network_audit_latest_dir: "{{ network_audit_base_dir }}/latest"
    network_audit_run_dir: "{{ network_audit_base_dir }}/{{ network_audit_timestamp }}"

  tasks:
    - name: Collect network/firewall state
      ansible.builtin.shell: |
        echo "================================================================"
        echo "NETWORK AUDIT REPORT"
        echo "Host: $(hostname)"
        echo "Inventory host: {{ inventory_hostname }}"
        echo "Timestamp: $(date -Is)"
        echo "================================================================"

        echo
        echo "### hostnamectl"
        hostnamectl 2>/dev/null || hostname

        echo
        echo "### Kernel"
        uname -a || true

        echo
        echo "### IP addresses"
        ip -br addr || true

        echo
        echo "### Routing table"
        ip route || true

        echo
        echo "### DNS: /etc/resolv.conf"
        cat /etc/resolv.conf 2>/dev/null || true

        echo
        echo "### DNS: resolvectl status"
        if command -v resolvectl >/dev/null 2>&1; then
          resolvectl status || true
        else
          echo "resolvectl not installed"
        fi

        echo
        echo "### Listening TCP/UDP sockets"
        ss -tulpn || true

        echo
        echo "### Relevant running services"
        systemctl --no-pager --plain --type=service --state=running 2>/dev/null \
          | grep -Ei 'nginx|docker|promtail|loki|prometheus|grafana|alertmanager|postgres|node-exporter|backup' || true

        echo
        echo "### UFW status verbose"
        if command -v ufw >/dev/null 2>&1; then
          ufw status verbose || true
        else
          echo "ufw not installed"
        fi

        echo
        echo "### UFW status numbered"
        if command -v ufw >/dev/null 2>&1; then
          ufw status numbered || true
        else
          echo "ufw not installed"
        fi

        echo
        echo "### iptables filter rules"
        if command -v iptables >/dev/null 2>&1; then
          iptables -S || true
        else
          echo "iptables not installed"
        fi

        echo
        echo "### iptables nat rules"
        if command -v iptables >/dev/null 2>&1; then
          iptables -t nat -S || true
        else
          echo "iptables not installed"
        fi

        echo
        echo "### iptables DOCKER-USER chain"
        if command -v iptables >/dev/null 2>&1; then
          iptables -S DOCKER-USER || true
          echo
          iptables -L DOCKER-USER -n -v || true
        else
          echo "iptables not installed"
        fi

        echo
        echo "### nftables ruleset"
        if command -v nft >/dev/null 2>&1; then
          nft list ruleset || true
        else
          echo "nft not installed"
        fi

        echo
        echo "### Docker containers and published ports"
        if command -v docker >/dev/null 2>&1; then
          docker ps || true
        else
          echo "docker not installed"
        fi

        echo
        echo "### Docker networks"
        if command -v docker >/dev/null 2>&1; then
          docker network ls || true
        else
          echo "docker not installed"
        fi

        echo
        echo "### Docker Compose project /opt/app"
        if command -v docker >/dev/null 2>&1 && [ -d /opt/app ]; then
          cd /opt/app && docker compose ps || true
        else
          echo "/opt/app compose project not present or docker not installed"
        fi

        echo
        echo "### Important local HTTP endpoints"
        if command -v curl >/dev/null 2>&1; then
          for url in \
            "http://localhost/" \
            "http://localhost/api/v1/health" \
            "http://localhost:8080/v1/health" \
            "http://localhost:8080/metrics" \
            "http://localhost:8090/metrics" \
            "http://localhost:9080/metrics" \
            "http://localhost:9090/-/ready" \
            "http://localhost:9093/-/ready" \
            "http://localhost:9100/metrics" \
            "http://localhost:9187/metrics" \
            "http://localhost:3100/ready" \
            "http://localhost:3000"; do
              code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 3 "$url" 2>/dev/null || echo "failed")
              echo "$url -> $code"
          done
        else
          echo "curl not installed"
        fi

        echo
        echo "================================================================"
        echo "END OF REPORT"
        echo "================================================================"
      args:
        executable: /bin/bash
      changed_when: false
      register: network_audit_report

    - name: Save per-node audit report to latest directory
      ansible.builtin.copy:
        content: "{{ network_audit_report.stdout }}\n"
        dest: "{{ network_audit_latest_dir }}/{{ inventory_hostname }}-network-audit.txt"
        mode: "0644"
      delegate_to: localhost
      become: false

    - name: Save per-node audit report to timestamped directory
      ansible.builtin.copy:
        content: "{{ network_audit_report.stdout }}\n"
        dest: "{{ network_audit_run_dir }}/{{ inventory_hostname }}-network-audit.txt"
        mode: "0644"
      delegate_to: localhost
      become: false


- name: Collect critical connectivity audit from control node
  hosts: control
  gather_facts: false
  become: false

  vars:
    network_audit_base_dir: "{{ hostvars['network_audit_context']['audit_base_dir'] }}"
    network_audit_timestamp: "{{ hostvars['network_audit_context']['audit_timestamp'] }}"
    network_audit_latest_dir: "{{ network_audit_base_dir }}/latest"
    network_audit_run_dir: "{{ network_audit_base_dir }}/{{ network_audit_timestamp }}"

  tasks:
    - name: Collect critical connectivity checks from admin
      ansible.builtin.shell: |
        echo "================================================================"
        echo "CRITICAL CONNECTIVITY AUDIT FROM ADMIN"
        echo "Host: $(hostname)"
        echo "Timestamp: $(date -Is)"
        echo "================================================================"

        check_http() {
          name="$1"
          url="$2"
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 5 "$url" 2>/dev/null || echo "failed")
          printf "%-35s %-45s %s\n" "$name" "$url" "$code"
        }

        check_tcp() {
          name="$1"
          host="$2"
          port="$3"
          if command -v nc >/dev/null 2>&1; then
            result=$(nc -n -vz -w 3 "$host" "$port" 2>&1 || true)
            printf "%-35s %-22s %s\n" "$name" "$host:$port" "$result"
          else
            printf "%-35s %-22s %s\n" "$name" "$host:$port" "nc not installed"
          fi
        }

        echo
        echo "### HTTP checks"
        check_http "web frontend" "http://{{ web_ip }}/"
        check_http "web api health" "http://{{ web_ip }}/api/v1/health"
        check_http "loki ready" "http://{{ log_ip }}:{{ loki_http_port }}/ready"
        check_http "prometheus ready" "http://{{ monitor_ip }}:{{ prometheus_port }}/-/ready"
        check_http "grafana" "http://{{ monitor_ip }}:{{ grafana_port }}"
        check_http "alertmanager ready" "http://{{ monitor_ip }}:{{ alertmanager_port }}/-/ready"

        echo
        echo "### TCP checks"
        check_tcp "ssh web" "{{ web_ip }}" "{{ ssh_port }}"
        check_tcp "ssh app" "{{ app_ip }}" "{{ ssh_port }}"
        check_tcp "ssh db" "{{ db_ip }}" "{{ ssh_port }}"
        check_tcp "ssh log" "{{ log_ip }}" "{{ ssh_port }}"
        check_tcp "ssh monitor" "{{ monitor_ip }}" "{{ ssh_port }}"

        check_tcp "web http" "{{ web_ip }}" "{{ web_http_port }}"
        check_tcp "app api" "{{ app_ip }}" "{{ app_api_port }}"
        check_tcp "bot metrics" "{{ app_ip }}" "{{ support_bot_metrics_port }}"
        check_tcp "postgres" "{{ db_ip }}" "{{ postgres_port }}"
        check_tcp "postgres exporter" "{{ db_ip }}" "{{ postgres_exporter_port }}"
        check_tcp "loki" "{{ log_ip }}" "{{ loki_http_port }}"
        check_tcp "prometheus" "{{ monitor_ip }}" "{{ prometheus_port }}"
        check_tcp "grafana" "{{ monitor_ip }}" "{{ grafana_port }}"
        check_tcp "alertmanager" "{{ monitor_ip }}" "{{ alertmanager_port }}"

        check_tcp "node_exporter web" "{{ web_ip }}" "{{ node_exporter_port }}"
        check_tcp "node_exporter app" "{{ app_ip }}" "{{ node_exporter_port }}"
        check_tcp "node_exporter db" "{{ db_ip }}" "{{ node_exporter_port }}"
        check_tcp "node_exporter log" "{{ log_ip }}" "{{ node_exporter_port }}"
        check_tcp "node_exporter monitor" "{{ monitor_ip }}" "{{ node_exporter_port }}"

        echo
        echo "================================================================"
        echo "END OF CONNECTIVITY AUDIT"
        echo "================================================================"
      args:
        executable: /bin/bash
      changed_when: false
      register: critical_connectivity_report

    - name: Save critical connectivity report to latest directory
      ansible.builtin.copy:
        content: "{{ critical_connectivity_report.stdout }}\n"
        dest: "{{ network_audit_latest_dir }}/admin-critical-connectivity.txt"
        mode: "0644"
      delegate_to: localhost

    - name: Save critical connectivity report to timestamped directory
      ansible.builtin.copy:
        content: "{{ critical_connectivity_report.stdout }}\n"
        dest: "{{ network_audit_run_dir }}/admin-critical-connectivity.txt"
        mode: "0644"
      delegate_to: localhost
