---
- name: Run PostgreSQL backup manually
  hosts: db_nodes
  gather_facts: false
  become: true

  vars_prompt:
    - name: ansible_become_password
      prompt: "BECOME password"
      private: true

  tasks:
    - name: Run postgres_backup manual backup tasks
      ansible.builtin.include_role:
        name: postgres_backup
        tasks_from: run_backup
