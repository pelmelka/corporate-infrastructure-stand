---
- name: Assert required postgres_exporter variables are defined
  ansible.builtin.assert:
    that:
      - postgres_exporter_service is defined
      - postgres_exporter_metrics_url is defined
    fail_msg: "Required postgres_exporter variables are missing."

- name: Ensure postgres_exporter package is installed
  ansible.builtin.apt:
    name: "{{ postgres_exporter_package_name }}"
    state: present
    update_cache: true

- name: Ensure postgres_exporter is enabled and running
  ansible.builtin.systemd_service:
    name: "{{ postgres_exporter_service }}"
    enabled: true
    state: started

- name: Check postgres_exporter service is active
  ansible.builtin.command: "systemctl is-active {{ postgres_exporter_service }}"
  changed_when: false

- name: Check postgres_exporter metrics endpoint
  ansible.builtin.uri:
    url: "{{ postgres_exporter_metrics_url }}"
    method: GET
    status_code: 200
    return_content: true
  register: postgres_exporter_metrics

- name: Assert postgres_exporter exposes pg_up metric
  ansible.builtin.assert:
    that:
      - "'pg_up' in postgres_exporter_metrics.content"
    fail_msg: "postgres_exporter metrics endpoint does not expose pg_up."
