---
- name: Assert required Prometheus variables are defined
  ansible.builtin.assert:
    that:
      - prometheus_service_name is defined
      - prometheus_config_path is defined
      - prometheus_rules_path is defined
      - prometheus_ready_url is defined
      - prometheus_targets_url is defined
      - prometheus_expected_jobs is defined
    fail_msg: "Required Prometheus variables are missing."

- name: Check Prometheus config source exists on control node
  ansible.builtin.stat:
    path: "{{ prometheus_config_src }}"
  delegate_to: localhost
  register: prometheus_config_src_stat

- name: Fail if Prometheus config source is missing
  ansible.builtin.fail:
    msg: "{{ prometheus_config_src }} is missing on control node."
  when: not prometheus_config_src_stat.stat.exists

- name: Check Prometheus rules source exists on control node
  ansible.builtin.stat:
    path: "{{ prometheus_rules_src }}"
  delegate_to: localhost
  register: prometheus_rules_src_stat

- name: Fail if Prometheus rules source is missing
  ansible.builtin.fail:
    msg: "{{ prometheus_rules_src }} is missing on control node."
  when: not prometheus_rules_src_stat.stat.exists

- name: Deploy Prometheus config with validation
  ansible.builtin.copy:
    src: "{{ prometheus_config_src }}"
    dest: "{{ prometheus_config_path }}"
    owner: "{{ prometheus_config_owner }}"
    group: "{{ prometheus_config_group }}"
    mode: "{{ prometheus_config_mode }}"
    backup: true
    validate: "promtool check config %s"
  notify: Restart prometheus

- name: Deploy Prometheus alert rules with validation
  ansible.builtin.copy:
    src: "{{ prometheus_rules_src }}"
    dest: "{{ prometheus_rules_path }}"
    owner: "{{ prometheus_rules_owner }}"
    group: "{{ prometheus_rules_group }}"
    mode: "{{ prometheus_rules_mode }}"
    backup: true
    validate: "promtool check rules %s"
  notify: Restart prometheus

- name: Run pending Prometheus handlers before checks
  ansible.builtin.meta: flush_handlers

- name: Ensure Prometheus is enabled and running
  ansible.builtin.systemd_service:
    name: "{{ prometheus_service_name }}"
    enabled: true
    state: started

- name: Check Prometheus service is active
  ansible.builtin.command: "systemctl is-active {{ prometheus_service_name }}"
  changed_when: false

- name: Check Prometheus readiness
  ansible.builtin.uri:
    url: "{{ prometheus_ready_url }}"
    method: GET
    status_code: 200
    return_content: false
  register: prometheus_ready
  retries: "{{ prometheus_ready_retries }}"
  delay: "{{ prometheus_ready_delay }}"
  until: prometheus_ready.status == 200

- name: Wait for Prometheus targets API to expose targets
  ansible.builtin.uri:
    url: "{{ prometheus_targets_url }}"
    method: GET
    status_code: 200
    return_content: true
  register: prometheus_targets
  retries: "{{ prometheus_ready_retries }}"
  delay: "{{ prometheus_ready_delay }}"
  until:
    - prometheus_targets.json is defined
    - prometheus_targets.json.data is defined
    - prometheus_targets.json.data.activeTargets is defined
    - prometheus_targets.json.data.activeTargets | length > 0

- name: Build list of Prometheus jobs from targets API
  ansible.builtin.set_fact:
    prometheus_actual_jobs: "{{ prometheus_targets.json.data.activeTargets | map(attribute='labels.job') | list | unique | sort }}"

- name: Show Prometheus jobs found in targets API
  ansible.builtin.debug:
    var: prometheus_actual_jobs

- name: Assert expected Prometheus jobs are present
  ansible.builtin.assert:
    that:
      - item in prometheus_actual_jobs
    fail_msg: "Expected Prometheus job '{{ item }}' was not found. Actual jobs: {{ prometheus_actual_jobs }}"
  loop: "{{ prometheus_expected_jobs }}"
  loop_control:
    label: "{{ item }}"
