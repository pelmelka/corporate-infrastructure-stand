---
- name: Assert required compose service variables are defined
  ansible.builtin.assert:
    that:
      - compose_project_dir is defined
      - compose_service_name is defined
      - compose_source_dir is defined
      - compose_source_files is defined
      - compose_env_file is defined
    fail_msg: "Required docker_compose_service variables are missing."

- name: Check compose project directory exists
  ansible.builtin.stat:
    path: "{{ compose_project_dir }}"
  register: compose_project_dir_stat

- name: Fail if compose project directory is missing
  ansible.builtin.fail:
    msg: "{{ compose_project_dir }} is missing. Run app_compose_project role first."
  when: not compose_project_dir_stat.stat.exists

- name: Check compose env file exists
  ansible.builtin.stat:
    path: "{{ compose_project_dir }}/{{ compose_env_file }}"
  register: compose_env_file_stat
  no_log: true

- name: Fail if compose env file is missing
  ansible.builtin.fail:
    msg: "{{ compose_project_dir }}/{{ compose_env_file }} is missing."
  when: not compose_env_file_stat.stat.exists
  no_log: true

- name: Enforce compose env file permissions
  ansible.builtin.file:
    path: "{{ compose_project_dir }}/{{ compose_env_file }}"
    state: file
    owner: "{{ compose_env_file_owner }}"
    group: "{{ compose_env_file_group }}"
    mode: "{{ compose_env_file_mode }}"
  no_log: true

- name: Deploy compose service source files
  ansible.builtin.copy:
    src: "{{ compose_source_dir }}/{{ item }}"
    dest: "{{ compose_project_dir }}/{{ item }}"
    owner: "{{ compose_service_file_owner }}"
    group: "{{ compose_service_file_group }}"
    mode: "{{ compose_service_file_mode }}"
    backup: true
  loop: "{{ compose_source_files }}"
  loop_control:
    label: "{{ item }}"
  notify: Rebuild compose service

- name: Flush handlers before service checks
  ansible.builtin.meta: flush_handlers

- name: Check compose service is running
  ansible.builtin.command: "{{ compose_service_ps_command }}"
  args:
    chdir: "{{ compose_project_dir }}"
  changed_when: false
  register: compose_service_ps

- name: Show compose service status
  ansible.builtin.debug:
    var: compose_service_ps.stdout_lines

- name: Check compose service health endpoint
  ansible.builtin.uri:
    url: "{{ compose_healthcheck_url }}"
    method: GET
    status_code: 200
    return_content: false
  when: compose_healthcheck_url is defined

- name: Check compose service metrics endpoint
  ansible.builtin.uri:
    url: "{{ compose_metrics_url }}"
    method: GET
    status_code: 200
    return_content: false
  when: compose_metrics_url is defined
