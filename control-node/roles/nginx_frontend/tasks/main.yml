---
- name: Assert required nginx_frontend variables are defined
  ansible.builtin.assert:
    that:
      - nginx_service_name is defined
      - nginx_web_root is defined
      - nginx_index_path is defined
      - nginx_site_config_path is defined
      - nginx_health_url is defined
      - nginx_api_health_url is defined
    fail_msg: "Required nginx_frontend variables are missing."

- name: Install nginx package
  ansible.builtin.apt:
    name: "{{ nginx_package_name }}"
    state: present
    update_cache: true

- name: Ensure nginx web root exists
  ansible.builtin.file:
    path: "{{ nginx_web_root }}"
    state: directory
    owner: "{{ nginx_frontend_owner }}"
    group: "{{ nginx_frontend_group }}"
    mode: "0755"

- name: Deploy frontend index.html
  ansible.builtin.copy:
    src: "{{ nginx_index_src }}"
    dest: "{{ nginx_index_path }}"
    owner: "{{ nginx_frontend_owner }}"
    group: "{{ nginx_frontend_group }}"
    mode: "{{ nginx_frontend_mode }}"
    backup: true

- name: Deploy nginx site config
  ansible.builtin.copy:
    src: "{{ nginx_site_config_src }}"
    dest: "{{ nginx_site_config_path }}"
    owner: "{{ nginx_config_owner }}"
    group: "{{ nginx_config_group }}"
    mode: "{{ nginx_config_mode }}"
    backup: true
  notify: Reload nginx

- name: Validate nginx configuration
  ansible.builtin.command: "nginx -t"
  changed_when: false

- name: Run pending nginx handlers before checks
  ansible.builtin.meta: flush_handlers

- name: Ensure nginx is enabled and running
  ansible.builtin.systemd_service:
    name: "{{ nginx_service_name }}"
    enabled: true
    state: started

- name: Check frontend local endpoint
  ansible.builtin.uri:
    url: "{{ nginx_health_url }}"
    method: GET
    status_code: 200
    return_content: false

- name: Check reverse proxy API health endpoint from web
  ansible.builtin.uri:
    url: "{{ nginx_api_health_url }}"
    method: GET
    status_code: 200
    return_content: false
