# Sample config for Prometheus.

global:
  scrape_interval:     15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

  # Attach these labels to any time series or alerts when communicating with
  # external systems (federation, remote storage, Alertmanager).
  external_labels:
      monitor: 'example'

# Alertmanager configuration
alerting:
  alertmanagers:
  - static_configs:
    - targets: ['localhost:9093']

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
   - /etc/prometheus/supportdesk.rules.yml
  # - "first_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: 'prometheus'

    # Override the global default and scrape targets from this job every 5 seconds.
    scrape_interval: 5s
    scrape_timeout: 5s

    # metrics_path defaults to '/metrics'
    # scheme defaults to 'http'.

    static_configs:
      - targets: ['localhost:9090']

  - job_name: node
    # If prometheus-node-exporter is installed, grab stats about the local
    # machine by default.
    static_configs:
      - targets: ['localhost:9100']
        labels:
          host: monitor

      - targets: ['192.168.85.131:9100']
        labels:
          host: web

      - targets: ['192.168.85.133:9100']
        labels:
          host: app

      - targets: ['192.168.85.135:9100']
        labels:
          host: log

      - targets: ['192.168.85.139:9100']
        labels:
          host: db

  - job_name: supportdesk-api
    metrics_path: /metrics
    static_configs:
      - targets: ['192.168.85.133:8080']
        labels:
          host: app
          service: support-desk-api
          env: lab

  - job_name: promtail-web
    metrics_path: /metrics
    static_configs:
      - targets: ['192.168.85.131:9080']
        labels:
          host: web
          service: promtail
          env: lab

  - job_name: postgres
    metrics_path: /metrics
    static_configs:
      - targets: ['192.168.85.139:9187']
        labels:
          host: db
          service: postgresql
          env: lab

  - job_name: support-bot
    metrics_path: /metrics
    static_configs:
      - targets: ['192.168.85.133:8090']
        labels:
          host: app
          service: misis-digital-support-bot
          env: lab
